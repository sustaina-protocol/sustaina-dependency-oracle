name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run contract tests
        run: |
          cd contracts/identity-registry
          cargo test --lib

      - name: Run CLI tests
        run: |
          cd cli/sustaina-cli
          cargo test

  oracle-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: oracle-service/package-lock.json

      - name: Install dependencies
        run: |
          cd oracle-service
          npm ci

      - name: Type check
        run: |
          cd oracle-service
          npm run type-check

      - name: Build
        run: |
          cd oracle-service
          npm run build

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/explorer-ui/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/explorer-ui
          npm ci

      - name: Type check
        run: |
          cd apps/explorer-ui
          npm run type-check

      - name: Build
        run: |
          cd apps/explorer-ui
          npm run build

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run clippy
        run: |
          cd contracts/identity-registry
          cargo clippy -- -D warnings
          cd ../../cli/sustaina-cli
          cargo clippy -- -D warnings
